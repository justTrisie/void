name: Deploy Void to Pages

on:
  push:
    branches:
      - main  # runs every time you push to the main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Secrets into app.js
        run: |
          # Use sed to find the placeholders and swap them with the GitHub Secrets
          sed -i 's|PLACEHOLDER_JSONBIN_KEY|${{ secrets.JSONBIN_KEY }}|g' app.js
          sed -i 's|PLACEHOLDER_IMGBB_KEY|${{ secrets.IMGBB_KEY }}|g' app.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Deploys the current root folder
          branch: gh-pages # Deploys it to a clean hosting branch
